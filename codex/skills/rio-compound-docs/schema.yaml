# Rio compound documentation checklist

required_fields:
  module:
    type: string
  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  symptom:
    type: string
  root_cause:
    type: string
  fix:
    type: string
  verification:
    type: string
